name: Tagged release

# On a version tag push (e.g. v0.4.0): build a signed release, upload it to
# the Play Console internal testing track and TestFlight, and publish a
# GitHub Release with the Android APK attached and notes generated from
# the commits/PRs merged since the last tag (issue #33). Promoting a build
# from internal/TestFlight to production stays a manual step on purpose.
# Android and iOS build and release independently — see nightly.yml for
# the secrets each needs and the same skip-if-missing gating.

on:
  push:
    tags:
      - 'v*'

jobs:
  check-android-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_ALIAS }}" ] && \
             [ -n "${{ secrets.ANDROID_KEY_PASSWORD }}" ] && \
             [ -n "${{ secrets.ANDROID_STORE_PASSWORD }}" ] && \
             [ -n "${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Android signing/Play secrets not set yet — skipping this run."
          fi

  build-and-release-android:
    needs: check-android-secrets
    if: needs.check-android-secrets.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run slang

      - name: Derive version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Write release signing config
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build signed app bundle and APK
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ github.run_number }} \
            --dart-define=SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL || 'http://localhost:8000' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
          flutter build apk --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ github.run_number }} \
            --dart-define=SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL || 'http://localhost:8000' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Upload to Play Console (internal testing)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: me.roboroads.framed
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          generate_release_notes: true

  check-ios-secrets:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - id: check
        run: |
          if [ -n "${{ secrets.IOS_CERTIFICATE_BASE64 }}" ] && \
             [ -n "${{ secrets.IOS_CERTIFICATE_PASSWORD }}" ] && \
             [ -n "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" ] && \
             [ -n "${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" ] && \
             [ -n "${{ secrets.IOS_TEAM_ID }}" ] && \
             [ -n "${{ secrets.APPSTORE_ISSUER_ID }}" ] && \
             [ -n "${{ secrets.APPSTORE_KEY_ID }}" ] && \
             [ -n "${{ secrets.APPSTORE_API_KEY_BASE64 }}" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::iOS signing/App Store Connect secrets not set yet — skipping this run."
          fi

  build-and-release-ios:
    needs: check-ios-secrets
    if: needs.check-ios-secrets.outputs.ready == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run slang

      - name: Derive version from tag
        id: version
        run: echo "name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Import distribution certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}

      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/"Provisioning Profiles"
          echo "${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}" | base64 -d \
            > ~/Library/MobileDevice/"Provisioning Profiles"/framed.mobileprovision

      - name: Build unsigned app
        run: |
          flutter build ios --release --no-codesign \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ github.run_number }} \
            --dart-define=SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL || 'http://localhost:8000' }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}

      - name: Archive and sign
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace -scheme Runner \
            -configuration Release -archivePath build/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
            CODE_SIGN_IDENTITY="Apple Distribution"

      - name: Export .ipa
        working-directory: ios
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>me.roboroads.framed</key>
              <string>${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive -archivePath build/Runner.xcarchive \
            -exportPath build/ios-release -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ios/build/ios-release/Runner.ipa
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
