name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  flutter:
    name: Format, analyze, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run slang
      - run: dart format --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test
