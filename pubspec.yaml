name: framed
description: "Framed — a local-area circular assassination game you play IRL."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  audioplayers: ^6.8.1
  camera: ^0.12.0+1
  characters: ^1.4.0
  cryptography: ^2.9.0
  firebase_core: 4.4.0
  firebase_messaging: 16.0.4
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_compass: ^0.8.1
  flutter_local_notifications: ^20.1.0
  flutter_localizations:
    sdk: flutter
  flutter_map: ^8.3.1
  flutter_secure_storage: ^10.3.1
  freezed_annotation: ^3.1.0
  geolocator: ^14.0.3
  get_it: ^9.2.1
  go_router: ^17.3.0
  latlong2: ^0.10.1
  mcp_toolkit: ^3.0.0
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.3
  photo_view: ^0.15.0
  postgrest: ^2.8.0
  qr_flutter: ^4.1.0
  share_plus: ^13.2.0
  slang: ^4.18.0
  slang_flutter: ^4.18.0
  supabase_flutter: ^2.16.0
  timezone: ^0.10.1
  unorm_dart: ^0.3.2
  url_launcher: ^6.3.2
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.2.5
  build_runner: ^2.15.1
  slang_build_runner: ^4.18.0

flutter:
  uses-material-design: true

  # In-app SFX only. The notification sounds live in the Android res/raw tree
  # and the iOS bundle instead — an OS channel can't read a Flutter asset.
  # Flutter doesn't recurse into subdirectories, so assets/audio/src/ (the
  # .wav sources tools/gen_audio.sh generates everything from) stays out of
  # the bundle.
  assets:
    - assets/audio/

  # Fonts are bundled, not fetched. The google_fonts package pulls from
  # fonts.gstatic.com at runtime, which would put a Google request in an
  # app whose whole pitch is that it doesn't phone anyone (CLAUDE.md:
  # "no analytics/tracking"). Both families are OFL — licences sit next to
  # the .ttf files.
  fonts:
    # Variable font: one file covers every weight, and the width axis is
    # what the wordmark is set in (see AppTheme.wordmark).
    - family: Archivo
      fonts:
        - asset: assets/fonts/Archivo-Variable.ttf
    - family: IBMPlexMono
      fonts:
        - asset: assets/fonts/IBMPlexMono-Regular.ttf
        - asset: assets/fonts/IBMPlexMono-Medium.ttf
          weight: 500
